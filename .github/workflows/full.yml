name: Full CI (Node + Python)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  node:
    name: Node.js CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build documentation
        run: npm run docs:build

      - name: Validate structure
        run: npm run project:validate

      - name: Generate overview
        run: npm run project:overview

  python:
    name: Python CI
    runs-on: ubuntu-latest
    needs: node

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: |
          pip install ruff black pytest

      - name: Lint
        run: ruff check .

      - name: Format check
        run: black --check .

      - name: Run tests
        run: pytest
